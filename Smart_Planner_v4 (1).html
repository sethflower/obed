<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Planner</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F4F6FA;--card:#FFF;--navy:#0B1426;--navy2:#132038;--accent:#2E6BE6;--accent-l:#EBF2FF;--green:#0F8A5F;--green-bg:#E6F7F0;--amber:#C07D12;--amber-bg:#FFF6E0;--red:#C93B3B;--red-bg:#FDECEC;--text:#1A2236;--text2:#4A5568;--text3:#8896AB;--text4:#B0BCCC;--border:#E4E9F0;--border2:#D0D8E4;--radius:12px;--shadow:0 1px 4px rgba(11,20,38,.06);--shadow-md:0 4px 16px rgba(11,20,38,.08);--font:'Plus Jakarta Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace}
html{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
button{font-family:var(--font);cursor:pointer;transition:all .15s}input,select,textarea{font-family:var(--font)}button:active{transform:scale(.97)}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:8px}
.hdr{background:var(--navy);padding:0 28px;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:100;gap:16px}
.hdr-brand{display:flex;align-items:center;gap:10px;margin-right:auto}.hdr-brand h1{color:#fff;font-size:15px;font-weight:700}.hdr-brand small{color:var(--text3);font-size:11px}
.tabs{display:flex;height:56px;align-items:stretch}.tab{padding:0 16px;border:none;background:0;color:var(--text3);font-weight:500;font-size:13px;position:relative;display:flex;align-items:center}.tab:hover{color:#CBD5E1}.tab.on{color:#fff;font-weight:600}.tab.on::after{content:"";position:absolute;bottom:0;left:10px;right:10px;height:2px;background:var(--accent);border-radius:2px 2px 0 0}
.add-b{height:34px;padding:0 16px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-weight:600;font-size:13px;display:flex;align-items:center;gap:5px}.add-b:hover{background:#1D4FA0}
.set-b{width:34px;height:34px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:0;color:var(--text3);font-size:15px;display:flex;align-items:center;justify-content:center}.set-b:hover{background:rgba(255,255,255,.06);color:#fff}
.main{padding:24px 28px;max-width:1280px;margin:0 auto}
.card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:20px}.stitle{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.kpi-r{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}.kpi{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:16px 18px}.kpi-l{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:1px}.kpi-v{font-size:26px;font-weight:800;margin-top:3px;font-family:var(--mono)}.kpi-s{font-size:11px;color:var(--text4);margin-top:2px}
.bdg{display:inline-flex;padding:2px 9px;border-radius:6px;font-size:11px;font-weight:600;white-space:nowrap}
.pw{position:relative;width:100%;height:8px;background:var(--border);border-radius:8px;cursor:pointer}.pw:hover{height:12px}.pf{height:100%;border-radius:8px;transition:width .15s;pointer-events:none;position:relative}.pf::after{content:attr(data-p);position:absolute;right:-2px;top:-20px;font-size:10px;font-weight:700;color:var(--text2);opacity:0;transition:opacity .15s;font-family:var(--mono);background:var(--card);padding:0 4px;border-radius:3px;border:1px solid var(--border)}.pw:hover .pf::after{opacity:1}
.tr{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .2s}.tr:hover{border-color:var(--border2);box-shadow:var(--shadow-md);transform:translateY(-1px)}.tr.done{opacity:.45}
.seg{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}.seg button{padding:6px 13px;border:none;background:var(--card);color:var(--text2);font-size:12px;font-weight:600;border-right:1px solid var(--border)}.seg button:last-child{border:none}.seg button.on{background:var(--accent);color:#fff}
.mo{position:fixed;inset:0;background:rgba(11,20,38,.55);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px);animation:fi .15s}.md{background:#fff;border-radius:18px;width:min(520px,94vw);max-height:90vh;overflow:hidden;box-shadow:0 12px 40px rgba(11,20,38,.15);animation:su .2s;display:flex;flex-direction:column}
.mh{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}.mh h3{font-size:16px;font-weight:700}.mb{padding:22px;overflow-y:auto;flex:1}
.mc{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--card);font-size:18px;color:var(--text3);display:flex;align-items:center;justify-content:center}
@keyframes fi{from{opacity:0}to{opacity:1}}@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fl{display:flex;flex-direction:column;gap:5px}.fl label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}.fl input,.fl select,.fl textarea{padding:8px 11px;border-radius:8px;border:1.5px solid var(--border);font-size:14px;color:var(--text);background:var(--bg);outline:none;width:100%}.fl input:focus,.fl select:focus,.fl textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(46,107,230,.08)}.fl textarea{resize:vertical;min-height:56px}
.bp{padding:10px 22px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:600;width:100%}.bp:hover{background:#1D4FA0}
.bo{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);font-size:13px;font-weight:500;color:var(--text2)}.bo:hover{background:var(--bg)}
.bd{padding:7px 14px;border-radius:8px;border:1px solid var(--red-bg);background:var(--red-bg);font-size:13px;font-weight:600;color:var(--red)}.bd:hover{background:#FDD}
.bs{padding:10px 22px;border-radius:8px;border:none;background:var(--green);color:#fff;font-size:14px;font-weight:600}.bs:hover{background:#0A7550}
.dp{position:fixed;right:0;top:0;bottom:0;width:min(420px,100vw);background:#fff;box-shadow:-6px 0 32px rgba(11,20,38,.1);z-index:999;display:flex;flex-direction:column;animation:sl .2s}@keyframes sl{from{transform:translateX(100%)}to{transform:translateX(0)}}
.co{position:fixed;inset:0;background:rgba(11,20,38,.4);display:flex;align-items:center;justify-content:center;z-index:2000;backdrop-filter:blur(3px)}.cb{background:#fff;border-radius:14px;padding:26px;width:min(360px,90vw);text-align:center}.cb h4{font-size:15px;font-weight:700;margin-bottom:6px}.cb p{color:var(--text2);font-size:14px;margin-bottom:18px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:8px;border:1px solid var(--border);font-size:13px;font-weight:500}.chip button{background:none;border:none;color:var(--text4);font-size:13px;padding:0}.chip button:hover{color:var(--red)}
.sw{border:1px solid var(--border);border-radius:16px;overflow:auto;background:var(--card)}.sg{display:grid;font-size:12px}.sh{padding:9px 6px;background:var(--navy);color:#fff;text-align:center;font-weight:600;font-size:11px}.sh.td{background:var(--accent)}.st{padding:7px 4px;font-size:10px;font-weight:600;color:var(--accent);text-align:center;background:var(--card);border-right:1px solid var(--border);border-bottom:1px solid var(--border);font-family:var(--mono)}.sc{padding:2px 3px;border-right:1px solid #F0F2F6;border-bottom:1px solid #F0F2F6;min-height:32px}.sc.td{background:var(--accent-l)}.sch{padding:2px 5px;border-radius:4px;font-size:9px;font-weight:600;display:block;margin:1px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.ht{width:100%;border-collapse:collapse;font-size:12px}.ht th{padding:7px 3px;background:var(--navy);color:#fff;font-size:10px;font-weight:600;position:sticky;top:0;z-index:2}.ht th:first-child{text-align:left;padding-left:12px;min-width:140px;position:sticky;left:0;z-index:3}.ht td:first-child{position:sticky;left:0;z-index:1;background:inherit;border-right:1px solid var(--border);padding:5px 10px}.hc{width:26px;height:26px;border-radius:6px;border:1.5px solid var(--border);background:0;color:#fff;font-size:13px;font-weight:700;display:inline-flex;align-items:center;justify-content:center}.hc.on{background:var(--green);border-color:var(--green)}
@media(max-width:768px){.hdr{padding:0 12px;gap:8px;height:auto;flex-wrap:wrap;padding:10px 12px}.tabs{overflow-x:auto;height:auto}.tab{padding:8px 12px}.tab.on::after{bottom:-2px}.main{padding:14px 12px}.kpi-r{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr!important}.dp{width:100vw}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useMemo,useCallback,useRef}=React;
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const td=()=>new Date().toISOString().split("T")[0];
const fmt=d=>{if(!d)return"—";const t=new Date(d);return`${String(t.getDate()).padStart(2,"0")}.${String(t.getMonth()+1).padStart(2,"0")}.${t.getFullYear()}`};
const fmtS=d=>{if(!d)return"";const t=new Date(d);return`${String(t.getDate()).padStart(2,"0")}.${String(t.getMonth()+1).padStart(2,"0")}`};
const diffD=(a,b)=>Math.round((new Date(a)-new Date(b))/864e5);
const isoOff=n=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().split("T")[0]};
const TABS=["Панель","Задачи","Сегодня","Расписание","Журнал"];
const dayN=["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];
const hours=Array.from({length:15},(_,i)=>`${String(i+7).padStart(2,"0")}:00`);
const monthN=["","Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
const CC={"Рабочая":"#2E6BE6","Совещание":"#6942A0","Проект":"#0A7B7B","Обучение":"#B04060","Личная":"#C06020","Рутина":"#64748B"};
const PC={"Высокий":"#C93B3B","Средний":"#C07D12","Низкий":"#0F8A5F"};
const PB={"Высокий":"var(--red-bg)","Средний":"var(--amber-bg)","Низкий":"var(--green-bg)"};
const gc=n=>CC[n]||"#64748B";const gp=n=>PC[n]||"#64748B";const gb=n=>PB[n]||"var(--bg)";
function getS(t,now){if(!t.name)return{l:" ",i:"",c:"#8896AB"};if(t.progress>=100)return{l:"Выполнено",i:"✅",c:"var(--green)"};if(t.deadline&&t.deadline<now&&t.progress<100)return{l:"Просрочено",i:"🔴",c:"var(--red)"};if(t.deadline){const dl=diffD(t.deadline,now);if(dl>=0&&dl<=2)return{l:"Горит",i:"⚠️",c:"var(--amber)"};}if(t.progress>0)return{l:"В работе",i:"🔄",c:"var(--accent)"};return{l:"Новая",i:"🆕",c:"var(--text3)"};}
const KEY="smart-planner-v5";const load=()=>{try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r)}catch(e){}return null};const save=d=>{try{localStorage.setItem(KEY,JSON.stringify(d))}catch(e){}};
const init=()=>{const s=load();if(s&&s.tasks&&s.version>=5)return s;return{version:5,categories:["Рабочая","Совещание","Проект","Обучение","Личная","Рутина"],priorities:["Высокий","Средний","Низкий"],tasks:[{id:uid(),name:"Подготовить отчёт Q1",cat:"Рабочая",pri:"Высокий",desc:"Сводный отчёт за квартал с графиками",start:td(),deadline:isoOff(3),progress:35,notes:"Нужны данные от финансов"},{id:uid(),name:"Совещание по проекту Alpha",cat:"Совещание",pri:"Средний",desc:"Еженедельный статус-митинг",start:td(),deadline:td(),progress:0,notes:"Презентация на 5 слайдов"},{id:uid(),name:"Обновить тарифы на сайте",cat:"Проект",pri:"Высокий",desc:"Актуализация цен",start:isoOff(-5),deadline:isoOff(-1),progress:45,notes:"Согласовать с маркетингом"},{id:uid(),name:"Курс по аналитике",cat:"Обучение",pri:"Низкий",desc:"Модуль 3 из 8",start:isoOff(-10),deadline:isoOff(15),progress:30,notes:""},{id:uid(),name:"Оптимизация маршрутов",cat:"Проект",pri:"Высокий",desc:"Зоны доставки 2 и 3",start:isoOff(-7),deadline:isoOff(7),progress:40,notes:"Приоритет — зона 3"}],habits:[{id:uid(),name:"Утреннее планирование",goal:"10 мин",checks:{}},{id:uid(),name:"Фокус-блок",goal:"2ч",checks:{}},{id:uid(),name:"Разбор почты",goal:"2×15 мин",checks:{}},{id:uid(),name:"Спорт",goal:"30 мин",checks:{}},{id:uid(),name:"Чтение",goal:"20 мин",checks:{}},{id:uid(),name:"Обзор дня",goal:"5 мин",checks:{}}],archive:[]}};
const Bdg=({children,color,bg})=><span className="bdg" style={{color,background:bg||color+"12"}}>{children}</span>;
const KPI=({label,value,sub,color})=><div className="kpi"><div className="kpi-l">{label}</div><div className="kpi-v" style={{color}}>{value}</div><div className="kpi-s">{sub}</div></div>;
function PBar({value=0,color="var(--accent)",onChange,size=8}){const ref=useRef(null);const hc=e=>{if(!onChange||!ref.current)return;const r=ref.current.getBoundingClientRect();const p=Math.round(Math.max(0,Math.min(100,((e.clientX-r.left)/r.width)*100))/5)*5;onChange(p)};return<div className="pw" ref={ref} onClick={hc} style={{height:size}} title={`${value}% — нажмите для изменения`}><div className="pf" data-p={`${value}%`} style={{width:`${Math.min(value,100)}%`,background:color,height:size}}/></div>}
function Confirm({title,text,onYes,onNo,yesLabel="Да",noLabel="Отмена",yesColor}){return<div className="co" onClick={onNo}><div className="cb" onClick={e=>e.stopPropagation()}><h4>{title}</h4><p>{text}</p><div style={{display:"flex",gap:8,justifyContent:"center"}}><button className="bo" onClick={onNo}>{noLabel}</button><button style={{padding:"8px 22px",borderRadius:8,border:"none",background:yesColor||"var(--accent)",color:"#fff",fontWeight:600,fontSize:14}} onClick={onYes}>{yesLabel}</button></div></div></div>}
function TForm({onClose,initial,onSubmit,cats,pris}){const[f,setF]=useState(initial?{...initial}:{name:"",cat:cats[0]||"",pri:pris[1]||pris[0]||"",desc:"",start:td(),deadline:"",progress:0,notes:""});const s=(k,v)=>setF(p=>({...p,[k]:v}));const go=()=>{if(!f.name.trim())return;onSubmit({...f,progress:parseInt(f.progress)||0});onClose()};return<div className="mo" onClick={onClose}><div className="md" onClick={e=>e.stopPropagation()}><div className="mh"><h3>{initial?"Редактировать":"Новая задача"}</h3><button className="mc" onClick={onClose}>×</button></div><div className="mb"><div style={{display:"flex",flexDirection:"column",gap:13}}><div className="fl"><label>Название *</label><input value={f.name} onChange={e=>s("name",e.target.value)} placeholder="Что нужно сделать?" autoFocus/></div><div className="fl"><label>Описание</label><textarea value={f.desc} onChange={e=>s("desc",e.target.value)} placeholder="Детали задачи..."/></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><div className="fl"><label>Категория</label><select value={f.cat} onChange={e=>s("cat",e.target.value)}>{cats.map(c=><option key={c}>{c}</option>)}</select></div><div className="fl"><label>Приоритет</label><select value={f.pri} onChange={e=>s("pri",e.target.value)}>{pris.map(p=><option key={p}>{p}</option>)}</select></div></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><div className="fl"><label>Дата начала</label><input type="date" value={f.start} onChange={e=>s("start",e.target.value)}/></div><div className="fl"><label>Дедлайн</label><input type="date" value={f.deadline} onChange={e=>s("deadline",e.target.value)}/></div></div><div className="fl"><label>Заметки</label><textarea value={f.notes} onChange={e=>s("notes",e.target.value)} placeholder="Примечания..."/></div><button className="bp" onClick={go} style={{marginTop:4}}>{initial?"Сохранить":"Добавить"}</button></div></div></div></div>}
function TDetail({task,onClose,onEdit,onDelete,onProg,now}){const st=getS(task,now);const dl=task.deadline?diffD(task.deadline,now):null;const[cd,setCd]=useState(false);const[cf,setCf]=useState(false);return<><div style={{position:"fixed",inset:0,background:"rgba(11,20,38,.2)",zIndex:998}} onClick={onClose}/><div className="dp"><div style={{padding:"18px 22px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between",background:"var(--bg)"}}><h3 style={{fontSize:14,fontWeight:700}}>Детали задачи</h3><button className="mc" onClick={onClose}>×</button></div><div style={{padding:22,overflowY:"auto",flex:1}}><div style={{display:"flex",gap:5,marginBottom:10,flexWrap:"wrap"}}><Bdg color={gc(task.cat)}>{task.cat}</Bdg><Bdg color={gp(task.pri)} bg={gb(task.pri)}>{task.pri}</Bdg><Bdg color={st.c}>{st.i} {st.l}</Bdg></div><h2 style={{fontSize:18,fontWeight:700,lineHeight:1.3,marginBottom:6}}>{task.name}</h2>{task.desc&&<p style={{color:"var(--text2)",fontSize:14,lineHeight:1.5,marginBottom:16}}>{task.desc}</p>}<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:18}}><div><div style={{fontSize:10,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",marginBottom:3}}>Начало</div><div style={{fontSize:14,fontWeight:600}}>{fmt(task.start)}</div></div><div><div style={{fontSize:10,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",marginBottom:3}}>Дедлайн</div><div style={{fontSize:14,fontWeight:600,color:dl!==null&&dl<0?"var(--red)":dl!==null&&dl<=2?"var(--amber)":"var(--text)"}}>{fmt(task.deadline)}{dl!==null&&dl<0?` (+${Math.abs(dl)}д)`:dl!==null&&dl>=0?` (${dl}д)`:""}</div></div></div><div style={{marginBottom:18}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><span style={{fontSize:10,fontWeight:700,color:"var(--text3)",textTransform:"uppercase"}}>Прогресс</span><span style={{fontSize:16,fontWeight:800,color:st.c,fontFamily:"var(--mono)"}}>{task.progress}%</span></div><PBar value={task.progress} color={st.c} onChange={p=>onProg(task.id,p)} size={14}/><div style={{fontSize:10,color:"var(--text4)",marginTop:3}}>Нажмите на полоску для обновления</div></div>{task.notes&&<div style={{marginBottom:16}}><div style={{fontSize:10,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",marginBottom:5}}>Заметки</div><div style={{background:"var(--bg)",borderRadius:8,padding:12,fontSize:14,color:"var(--text2)",lineHeight:1.5,border:"1px solid var(--border)"}}>{task.notes}</div></div>}</div><div style={{padding:"14px 22px",borderTop:"1px solid var(--border)",display:"flex",gap:8,justifyContent:"flex-end"}}><button className="bd" onClick={()=>setCd(true)}>Удалить</button><button className="bo" onClick={()=>onEdit(task)}>Редактировать</button>{task.progress<100&&<button className="bs" onClick={()=>setCf(true)}>Завершить ✅</button>}</div></div>{cd&&<Confirm title="Удалить задачу?" text={`«${task.name}» будет удалена.`} onNo={()=>setCd(false)} onYes={()=>{onDelete(task.id);onClose()}} yesLabel="Удалить" yesColor="var(--red)"/>}{cf&&<Confirm title="Завершить задачу?" text={`Отметить «${task.name}» как выполненную?`} onNo={()=>setCf(false)} onYes={()=>{onProg(task.id,100);setCf(false)}} yesLabel="Завершить" yesColor="var(--green)"/>}</>}
function Settings({data,onUpdate,onClose}){const[nc,setNc]=useState("");const[np,setNp]=useState("");return<div className="mo" onClick={onClose}><div className="md" onClick={e=>e.stopPropagation()}><div className="mh"><h3>⚙️ Настройки</h3><button className="mc" onClick={onClose}>×</button></div><div className="mb"><div style={{marginBottom:22}}><div className="stitle">Категории</div><div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>{data.categories.map(c=><div key={c} className="chip"><span style={{width:7,height:7,borderRadius:4,background:gc(c)}}></span>{c}<button onClick={()=>onUpdate(d=>{d.categories=d.categories.filter(x=>x!==c)})}>×</button></div>)}</div><div style={{display:"flex",gap:6}}><input value={nc} onChange={e=>setNc(e.target.value)} placeholder="Новая категория..." style={{flex:1,padding:"6px 10px",borderRadius:8,border:"1.5px solid var(--border)",fontSize:13,background:"var(--bg)"}} onKeyDown={e=>{if(e.key==="Enter"&&nc.trim()){onUpdate(d=>{if(!d.categories.includes(nc.trim()))d.categories.push(nc.trim())});setNc("")}}}/><button className="bo" onClick={()=>{if(nc.trim()){onUpdate(d=>{if(!d.categories.includes(nc.trim()))d.categories.push(nc.trim())});setNc("")}}}>+</button></div></div><div style={{marginBottom:22}}><div className="stitle">Приоритеты</div><div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>{data.priorities.map(p=><div key={p} className="chip"><span style={{width:7,height:7,borderRadius:4,background:gp(p)}}></span>{p}<button onClick={()=>onUpdate(d=>{d.priorities=d.priorities.filter(x=>x!==p)})}>×</button></div>)}</div><div style={{display:"flex",gap:6}}><input value={np} onChange={e=>setNp(e.target.value)} placeholder="Новый приоритет..." style={{flex:1,padding:"6px 10px",borderRadius:8,border:"1.5px solid var(--border)",fontSize:13,background:"var(--bg)"}} onKeyDown={e=>{if(e.key==="Enter"&&np.trim()){onUpdate(d=>{if(!d.priorities.includes(np.trim()))d.priorities.push(np.trim())});setNp("")}}}/><button className="bo" onClick={()=>{if(np.trim()){onUpdate(d=>{if(!d.priorities.includes(np.trim()))d.priorities.push(np.trim())});setNp("")}}}>+</button></div></div><div><div className="stitle">Данные</div><div style={{display:"flex",gap:8}}><button className="bo" onClick={()=>{const b=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="planner-backup.json";a.click()}}>📥 Экспорт</button><button className="bo" onClick={()=>{const inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.tasks){onUpdate(()=>d);alert("Импортировано!")}}catch(ex){alert("Ошибка файла")}};r.readAsText(f)};inp.click()}}>📤 Импорт</button></div></div></div></div></div>}
function App(){const[data,setData]=useState(init);const[tab,setTab]=useState("Панель");const now=td();const[showForm,setShowForm]=useState(false);const[editTask,setEditTask]=useState(null);const[detailTask,setDetailTask]=useState(null);const[showSettings,setShowSettings]=useState(false);const[filter,setFilter]=useState("active");const[sortBy,setSortBy]=useState("deadline");const[schedDate,setSchedDate]=useState(now);const[habMonth,setHabMonth]=useState(()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`});const[newHN,setNewHN]=useState("");
useEffect(()=>{save(data)},[data]);
const up=useCallback(fn=>setData(p=>{const c=JSON.parse(JSON.stringify(p));const r=fn(c);return r||c}),[]);
const addT=t=>up(d=>{d.tasks.push({id:uid(),...t})});const updT=(id,patch)=>up(d=>{const i=d.tasks.findIndex(x=>x.id===id);if(i>=0)Object.assign(d.tasks[i],patch)});const delT=id=>{up(d=>{d.tasks=d.tasks.filter(x=>x.id!==id)});setDetailTask(null)};
const setProg=(id,p)=>{updT(id,p>=100?{progress:p,completedAt:td()}:{progress:p,completedAt:null});if(detailTask&&detailTask.id===id)setDetailTask(prev=>({...prev,progress:p,completedAt:p>=100?td():null}))};
const archDone=()=>up(d=>{const done=d.tasks.filter(t=>getS(t,now).l==="Выполнено");d.archive.push(...done.map(t=>({...t,archivedAt:now,completedAt:t.completedAt||now})));d.tasks=d.tasks.filter(t=>getS(t,now).l!=="Выполнено")});
const stats=useMemo(()=>{const s={total:0,done:0,active:0,burn:0,over:0};data.tasks.forEach(t=>{if(!t.name)return;s.total++;const st=getS(t,now);if(st.l==="Выполнено")s.done++;else if(st.l==="В работе")s.active++;else if(st.l==="Горит")s.burn++;else if(st.l==="Просрочено")s.over++});s.pct=s.total>0?Math.round(s.done/s.total*100):0;return s},[data.tasks,now]);
const filtered=useMemo(()=>{let l=[...data.tasks].filter(t=>t.name);if(filter==="active")l=l.filter(t=>getS(t,now).l!=="Выполнено");else if(filter==="completed")l=l.filter(t=>getS(t,now).l==="Выполнено");if(sortBy==="deadline")l.sort((a,b)=>(a.deadline||"9999").localeCompare(b.deadline||"9999"));else{const o={};data.priorities.forEach((p,i)=>o[p]=i);l.sort((a,b)=>(o[a.pri]??99)-(o[b.pri]??99)||(a.deadline||"9999").localeCompare(b.deadline||"9999"))}return l},[data.tasks,data.priorities,filter,sortBy,now]);
const todayL=useMemo(()=>data.tasks.filter(t=>{if(!t.name)return false;const st=getS(t,now);if(st.l==="Выполнено")return false;if(!t.start||t.start>now)return false;if(st.l==="Просрочено")return true;if(!t.deadline||t.deadline>=now)return true;return false}).sort((a,b)=>{const o={};data.priorities.forEach((p,i)=>o[p]=i);return(o[a.pri]??99)-(o[b.pri]??99)}),[data.tasks,data.priorities,now]);
const urgent=useMemo(()=>data.tasks.filter(t=>{const s=getS(t,now).l;return s==="Просрочено"||s==="Горит"}),[data.tasks,now]);
const getMon=d=>{const dt=new Date(d);const dw=dt.getDay();const diff=dt.getDate()-dw+(dw===0?-6:1);return new Date(dt.setDate(diff)).toISOString().split("T")[0]};
const weekD=useMemo(()=>{const m=getMon(schedDate);return Array.from({length:7},(_,i)=>{const d=new Date(m);d.setDate(d.getDate()+i);return d.toISOString().split("T")[0]})},[schedDate]);
const getTFD=useCallback(day=>data.tasks.filter(t=>{if(!t.name||getS(t,now).l==="Выполнено")return false;const st=getS(t,now);if(t.start&&t.start<=day&&t.deadline&&t.deadline>=day)return true;if(st.l==="Просрочено"&&day>=now)return true;if(t.start&&t.start<=day&&!t.deadline)return true;return false}),[data.tasks,now]);
const daysInM=useMemo(()=>{const[y,m]=habMonth.split("-").map(Number);return new Date(y,m,0).getDate()},[habMonth]);
return<div>
<div className="hdr"><div className="hdr-brand"><span style={{fontSize:20}}>📊</span><div><h1>Smart Planner</h1><small>{fmt(now)}</small></div></div><div className="tabs">{TABS.map(t=><button key={t} className={`tab ${tab===t?"on":""}`} onClick={()=>setTab(t)}>{t}</button>)}</div><div style={{display:"flex",gap:8}}><button className="add-b" onClick={()=>{setEditTask(null);setShowForm(true)}}>+ Задача</button><button className="set-b" onClick={()=>setShowSettings(true)} title="Настройки">⚙</button></div></div>
<div className="main">
{tab==="Панель"&&<><div className="kpi-r"><KPI label="Всего" value={stats.total} sub="задач" color="var(--navy)"/><KPI label="Выполнено" value={stats.done} sub={`${stats.pct}%`} color="var(--green)"/><KPI label="В работе" value={stats.active} sub="активных" color="var(--accent)"/><KPI label="Горит" value={stats.burn} sub="≤ 2 дня" color="var(--amber)"/><KPI label="Просрочено" value={stats.over} sub="срок вышел" color="var(--red)"/></div><div className="card" style={{marginBottom:20}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><span className="stitle" style={{margin:0}}>Общий прогресс</span><span style={{fontWeight:800,fontSize:18,color:"var(--accent)",fontFamily:"var(--mono)"}}>{stats.pct}%</span></div><PBar value={stats.pct} size={10}/></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:20}} className="two-col"><div className="card"><div className="stitle">По приоритетам</div>{data.priorities.map(p=>{const c=data.tasks.filter(t=>t.name&&t.pri===p).length;return<div key={p} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0"}}><Bdg color={gp(p)} bg={gb(p)}>{p}</Bdg><span style={{fontWeight:800,fontSize:16,color:gp(p),fontFamily:"var(--mono)"}}>{c}</span></div>})}</div><div className="card"><div className="stitle">По категориям</div>{data.categories.map(c=>{const n=data.tasks.filter(t=>t.name&&t.cat===c).length;if(!n)return null;return<div key={c} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0"}}><Bdg color={gc(c)}>{c}</Bdg><span style={{fontWeight:800,fontSize:16,color:gc(c),fontFamily:"var(--mono)"}}>{n}</span></div>})}</div></div>{urgent.length>0&&<div className="card" style={{borderLeft:"3px solid var(--red)"}}><div className="stitle" style={{color:"var(--red)"}}>🔥 Требуют внимания</div>{urgent.map(t=>{const st=getS(t,now);return<div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid var(--border)",cursor:"pointer"}} onClick={()=>setDetailTask(t)}><div><div style={{fontWeight:600}}>{t.name}</div><div style={{fontSize:12,color:"var(--text3)"}}>{t.cat} · {fmt(t.deadline)}</div></div><Bdg color={st.c}>{st.i} {st.l}</Bdg></div>})}</div>}</>}
{tab==="Задачи"&&<><div className="filter-bar"><div className="seg">{[["active","Активные"],["all","Все"],["completed","Готовые"]].map(([k,l])=><button key={k} className={filter===k?"on":""} onClick={()=>setFilter(k)}>{l}</button>)}</div><select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{padding:"6px 10px",borderRadius:8,border:"1.5px solid var(--border)",fontSize:12,background:"var(--card)"}}><option value="deadline">По дедлайну</option><option value="priority">По приоритету</option></select>{data.tasks.some(t=>getS(t,now).l==="Выполнено")&&<button className="bo" onClick={archDone} style={{fontSize:12}}>📦 Архивировать</button>}<span style={{fontSize:12,color:"var(--text4)",marginLeft:"auto"}}>{filtered.length}</span></div><div style={{display:"flex",flexDirection:"column",gap:5}}>{filtered.map(t=>{const st=getS(t,now);const dl=t.deadline?diffD(t.deadline,now):null;return<div key={t.id} className={`tr ${st.l==="Выполнено"?"done":""}`} onClick={()=>setDetailTask(t)}><div className="task-left" style={{width:4,alignSelf:"stretch",borderRadius:4,flexShrink:0,background:gp(t.pri)}}/><div style={{flex:1,minWidth:0}}><div style={{fontWeight:600,fontSize:14,textDecoration:st.l==="Выполнено"?"line-through":"none",color:st.l==="Выполнено"?"var(--text3)":"var(--text)"}}>{t.name}</div><div style={{display:"flex",gap:4,marginTop:4,flexWrap:"wrap",alignItems:"center"}}><Bdg color={gc(t.cat)}>{t.cat}</Bdg><Bdg color={gp(t.pri)} bg={gb(t.pri)}>{t.pri}</Bdg>{t.deadline&&<span style={{fontSize:11,color:dl<0?"var(--red)":dl<=2?"var(--amber)":"var(--text3)"}}>📅 {fmt(t.deadline)}{dl!==null&&dl<0?` (+${Math.abs(dl)}д)`:""}</span>}</div><div style={{marginTop:5}} onClick={e=>e.stopPropagation()}><PBar value={t.progress} color={st.c} onChange={p=>setProg(t.id,p)}/></div></div><div style={{textAlign:"right",flexShrink:0}}><Bdg color={st.c}>{st.i} {st.l}</Bdg><div style={{fontSize:12,fontWeight:700,color:st.c,fontFamily:"var(--mono)",marginTop:3}}>{t.progress}%</div></div></div>})}{filtered.length===0&&<div style={{textAlign:"center",padding:50,color:"var(--text4)"}}><div style={{fontSize:36,marginBottom:8}}>📋</div><div style={{fontWeight:600}}>Нет задач</div></div>}</div></>}
{tab==="Сегодня"&&<><div style={{marginBottom:14}}><div style={{fontWeight:800,fontSize:18}}>{fmt(now)}</div><div style={{color:"var(--text3)",fontSize:13}}>{todayL.length} активных задач</div></div>{todayL.map(t=>{const st=getS(t,now);return<div key={t.id} className="card" style={{marginBottom:7,borderLeft:`3px solid ${gp(t.pri)}`,cursor:"pointer"}} onClick={()=>setDetailTask(t)}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,flexWrap:"wrap"}}><div style={{flex:1}}><div style={{fontWeight:700,fontSize:15}}>{t.name}</div>{t.desc&&<div style={{fontSize:13,color:"var(--text2)",marginTop:2}}>{t.desc}</div>}<div style={{display:"flex",gap:5,marginTop:7,flexWrap:"wrap"}}><Bdg color={gc(t.cat)}>{t.cat}</Bdg><Bdg color={st.c}>{st.i} {st.l}</Bdg>{t.deadline&&<span style={{fontSize:11,color:"var(--text3)"}}>📅 {fmt(t.deadline)}</span>}</div></div><div style={{fontSize:16,fontWeight:800,color:st.c,fontFamily:"var(--mono)"}}>{t.progress}%</div></div><div style={{marginTop:10}} onClick={e=>e.stopPropagation()}><PBar value={t.progress} color={st.c} onChange={p=>setProg(t.id,p)} size={10}/></div></div>})}{todayL.length===0&&<div style={{textAlign:"center",padding:50,color:"var(--text4)"}}><div style={{fontSize:44,marginBottom:10}}>🎉</div><div style={{fontSize:15,fontWeight:700}}>Всё выполнено!</div></div>}</>}
{tab==="Расписание"&&<><div style={{display:"flex",alignItems:"center",gap:7,marginBottom:14,flexWrap:"wrap"}}><button className="bo" style={{padding:"5px 11px"}} onClick={()=>{const d=new Date(schedDate);d.setDate(d.getDate()-7);setSchedDate(d.toISOString().split("T")[0])}}>←</button><input type="date" value={schedDate} onChange={e=>setSchedDate(e.target.value)} style={{padding:"6px 10px",borderRadius:8,border:"1.5px solid var(--border)",fontSize:13,fontWeight:600,background:"var(--card)"}}/><button className="bo" style={{padding:"5px 11px"}} onClick={()=>{const d=new Date(schedDate);d.setDate(d.getDate()+7);setSchedDate(d.toISOString().split("T")[0])}}>→</button><button className="bo" onClick={()=>setSchedDate(td())} style={{fontSize:12}}>Сегодня</button></div><div className="sw"><div className="sg" style={{gridTemplateColumns:`52px repeat(7,minmax(80px,1fr))`}}><div className="sh" style={{fontSize:9}}>Время</div>{weekD.map((d,i)=><div key={d} className={`sh ${d===now?"td":""}`}><div>{dayN[i]}</div><div style={{fontSize:10,opacity:.7,fontWeight:400}}>{fmtS(d)}</div></div>)}{hours.map((h,hi)=><React.Fragment key={h}><div className="st">{h}</div>{weekD.map(d=>{const dt=getTFD(d);return<div key={d} className={`sc ${d===now?"td":""}`}>{hi<dt.length&&<span className="sch" style={{background:gc(dt[hi].cat)+"10",color:gc(dt[hi].cat)}} onClick={()=>setDetailTask(dt[hi])}>{dt[hi].name}</span>}</div>})}</React.Fragment>)}</div></div></>}
{tab==="Журнал"&&<>{/* Month navigation */}<div style={{display:"flex",alignItems:"center",gap:7,marginBottom:14,flexWrap:"wrap"}}><button className="bo" style={{padding:"5px 11px"}} onClick={()=>{const[y,m]=habMonth.split("-").map(Number);const d=new Date(y,m-2,1);setHabMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`)}} >←</button><input type="month" value={habMonth} onChange={e=>setHabMonth(e.target.value)} style={{padding:"6px 10px",borderRadius:8,border:"1.5px solid var(--border)",fontSize:13,fontWeight:600,background:"var(--card)"}}/><button className="bo" style={{padding:"5px 11px"}} onClick={()=>{const[y,m]=habMonth.split("-").map(Number);const d=new Date(y,m,1);setHabMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`)}} >→</button><span style={{fontWeight:700,fontSize:15}}>{monthN[parseInt(habMonth.split("-")[1])]} {habMonth.split("-")[0]}</span><span style={{fontSize:12,color:"var(--text4)",marginLeft:8}}>{(()=>{const all=[...data.tasks,...data.archive];return all.filter(t=>t.completedAt&&t.completedAt.startsWith(habMonth)).length})()} завершённых</span></div><div className="card" style={{padding:0,overflow:"auto"}}><table className="ht"><thead><tr><th>Задача</th><th style={{minWidth:60}}>Категория</th>{Array.from({length:daysInM},(_,i)=>{const dk=`${habMonth}-${String(i+1).padStart(2,"0")}`;return<th key={i} style={{background:dk===now?"var(--accent)":"var(--navy)",minWidth:28}}>{i+1}</th>})}</tr></thead><tbody>{(()=>{const all=[...data.tasks,...data.archive];const completed=all.filter(t=>t.completedAt&&t.completedAt.startsWith(habMonth));if(completed.length===0)return<tr><td colSpan={daysInM+2} style={{textAlign:"center",padding:40,color:"var(--text4)"}}>Нет завершённых задач в этом месяце</td></tr>;return completed.map((t,i)=><tr key={t.id||i} style={{background:i%2===0?"#fff":"var(--bg)"}}><td><div style={{fontWeight:600,fontSize:12}}>{t.name}</div>{t.desc&&<div style={{fontSize:10,color:"var(--text4)"}}>{t.desc}</div>}</td><td style={{textAlign:"center"}}><Bdg color={gc(t.cat)}>{t.cat}</Bdg></td>{Array.from({length:daysInM},(_,di)=>{const dk=`${habMonth}-${String(di+1).padStart(2,"0")}`;const done=t.completedAt===dk;return<td key={di} style={{textAlign:"center",padding:1}}>{done&&<span style={{display:"inline-flex",width:26,height:26,borderRadius:6,background:"var(--green)",color:"#fff",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700}}>✓</span>}</td>})}</tr>)})()}</tbody></table></div></>}
</div>
{showForm&&<TForm onClose={()=>{setShowForm(false);setEditTask(null)}} initial={editTask} cats={data.categories} pris={data.priorities} onSubmit={t=>{if(editTask)updT(editTask.id,t);else addT(t)}}/>}
{detailTask&&<TDetail task={data.tasks.find(x=>x.id===detailTask.id)||detailTask} onClose={()=>setDetailTask(null)} now={now} onEdit={t=>{setDetailTask(null);setEditTask(t);setShowForm(true)}} onDelete={delT} onProg={setProg}/>}
{showSettings&&<Settings data={data} onUpdate={up} onClose={()=>setShowSettings(false)}/>}
</div>}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
